<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="fragments :: head-comun"></th:block>
    <title>Citas | Dashboard</title>
</head>

<body class="dashboard-body">
    <div class="dashboard">
        <aside th:replace="fragments :: aside('citas')"></aside>

        <main class="main-content">
            <div class="main-content__header">
                <h1>Mis Citas</h1>
            </div>
            <section>
                <div class="booking-container">
                    <div class="booking-card">
                        <header class="booking-header">
                            <h2>Agendar Nueva Cita</h2>
                            <p>Complete los datos para asegurar su lugar en DentCare Plus.</p>
                        </header>

                        <form id="formAgendarCita" class="booking-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="selectDentista">Dentista Especialista</label>
                                    <select id="selectDentista" name="dentistaId" required onchange="actualizarHoras()">
                                        <option value="" selected disabled>Seleccione un dentista...</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="selectServicio">Tipo de Servicio</label>
                                    <select id="selectServicio" name="servicioId" required>
                                        <option value="" selected disabled>Seleccione un servicio...</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="fechaCita">Fecha de Consulta</label>
                                <input type="date" id="fechaCita" name="fecha" required onchange="actualizarHoras()">
                            </div>

                            <div class="form-group">
                                <label>Horarios Disponibles</label>
                                <div id="contenedor-horas" class="time-grid">
                                    <p class="placeholder-text">Seleccione dentista y fecha para ver horarios.</p>
                                </div>
                                <input type="hidden" id="horaSeleccionada" name="hora" required>
                            </div>

                            <div class="form-group">
                                <label for="notas">Notas Adicionales (Opcional)</label>
                                <textarea id="notas" name="notas" rows="3"
                                    placeholder="¿Algún síntoma o detalle que debamos saber?"></textarea>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn-secondary"
                                    onclick="window.history.back()">Regresar</button>
                                <button type="submit" class="btn-primary">Confirmar Cita</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
            <section class="recientes">
                <div class="">
                    <h3>Todas las Citas</h2>
                    <div class="tabla-contenedor">
                        <table id="table-actividad">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Tratamiento</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>

                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>
    <script type="module" th:src="@{/js/citas.js}"></script>
</body>

</html>
