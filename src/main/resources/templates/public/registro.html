<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | DentCare Plus</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page"> <main class="login-container">
        <div class="login-card">
            
            <div class="login-card__info">
                <div class="login-card__logo">
                    <img th:src="@{/img/logo.svg}" alt="Logo DentCare Plus">
                </div>
                <h2>Únete a nosotros</h2>
                <p>Crea tu cuenta para agendar citas, consultar tu historial y recibir atención personalizada.</p>
            </div>

            <div class="login-card__form">
                <form id="registroForm">
                    <h3>Registro de Paciente</h3>

                    <div class="campo">
                        <label for="username">Correo Electrónico</label>
                        <input type="username" id="username" name="username" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="campo">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <div class="campo">
                        <label for="name">Nombre</label>
                        <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                    </div>
                    <div class="campo">
                        <label for="lastname">Apellido</label>
                        <input type="text" id="lastname" name="lastname" placeholder="Tu apellido" required>
                    </div>
                    <div class="campo">
                        <label for="celphone">Telefono</label>
                        <input type="tel" id="celphone" name="celphone" placeholder="Tu telefono" required>
                    </div>

                   <div class="campo">
                        <label for="fechaNacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                    </div>

                    <div class="login-card__actions">
                        <button type="submit" id="btnRegistro" class="btn-primary">Registrarse</button>
                        <a th:href="@{/login}" class="enlace">¿Ya tienes cuenta? Inicia Sesión</a>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <script th:src="@{/js/registro.js}"></script>
</body>
</html>
