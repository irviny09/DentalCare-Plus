<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments :: head-comun}"></th:block>
    <title>Iniciar Sesión | DentCare Plus</title>
</head>
<body class="login-page">

    <main class="login-container">
        <div class="login-card">
            
            <div class="login-card__info">
                <div class="login-card__logo">
                    <img th:src="@{/img/logo.svg}" alt="Logo DentCare Plus">
                </div>
                <h2>¡Bienvenido de nuevo!</h2>
                <p>Accede a tu cuenta para gestionar tus citas y servicios dentales.</p>
            </div>

            <div class="login-card__form">
                <form id="loginForm" method="post">
                    <h3>Iniciar Sesión</h3>
                    
                    <div th:if="${param.error}" class="alerta alerta--error">
                        Usuario o contraseña incorrectos.
                    </div>

                    <div class="campo">
                        <label for="username">Correo Electrónico</label>
                        <input type="email" id="username" name="username" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="campo">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                    </div>

                    <div class="login-card__actions">
                        <input id="btnSubmit" type="submit" class="btn-primary" value="Entrar">
                        <a th:href="@{/registro}" class="enlace">¿No tienes cuenta? Regístrate</a>
                    </div>
                </form>
            </div>

        </div>
    </main>
<script type="module" th:src="@{/js/login.js}"></script>
</body>
</html>
